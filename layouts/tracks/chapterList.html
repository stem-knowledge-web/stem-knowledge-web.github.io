{{ define "main" }}
<h2>{{ .Title }}</h2>
<p>{{ .Content }}</p>
<table>
    <thead>
        <tr>
            <th>Chapter Number</th>
            <th>Chapter Title</th>
        </tr>
    </thead>
    <tbody>
        {{ $index := 0 }} {{ range .Pages }} {{ $index = add $index 1 }}
        <tr>
            <td>{{ $index }}</td>
            <td><a href="{{ .Permalink }}">{{ .Title }}</a></td>
        </tr>
        {{ end }}
    </tbody>
</table>
{{ end }}
